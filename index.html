<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码扫描测试</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; border: 1px solid #ccc; border-radius: 8px; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 4px; word-break: break-all; width: 100%; max-width: 500px; }
        .btn-group { margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #007aff; color: white; }
    </style>
</head>
<body>

    <h2>扫码测试</h2>
    
    <div class="btn-group">
        <button onclick="startScan()">开启摄像头</button>
        <button onclick="stopScan()" style="background:#ff3b30;">停止</button>
    </div>

    <div id="reader"></div>
    <div id="result">扫描结果将显示在这里</div>

    <script>
        let html5QrCode;

        function onScanSuccess(decodedText, decodedResult) {
            // 扫描成功逻辑
            document.getElementById('result').innerText = "结果: " + decodedText;
            // 可以在这里停止扫描
            // stopScan(); 
        }

        function onScanFailure(error) {
            // 扫描失败通常是因为没对准或光线不好，通常不处理
        }

        function startScan() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            // 使用后置摄像头
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                document.getElementById('result').innerText = "错误: " + err;
            });
        }

        function stopScan() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                }).catch(err => console.error(err));
            }
        }
    </script>
</body>
</html>
