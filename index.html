<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极速扫码拍照一体化</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f4; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        #result-box { margin-top: 15px; padding: 10px; background: white; border-radius: 8px; }
        .photo-preview { width: 100px; height: 100px; object-fit: cover; margin: 5px; border: 2px solid #007bff; }
        h3 { color: #333; margin-top: 0; }
    </style>
</head>
<body>

    <div id="reader"></div>
    
    <div id="result-box">
        <h3>扫描结果 (自动拍照)</h3>
        <div id="scanned-result">等待扫描...</div>
        <div id="photo-container"></div>
    </div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const photoContainer = document.getElementById('photo-container');
    const resultText = document.getElementById('scanned-result');

    // 1. 核心配置：模仿快递扫描频率
    const config = { 
        fps: 25,        // 每秒帧数，越高越顺滑
        qrbox: { width: 250, height: 250 }, // 扫描框大小
        aspectRatio: 1.0 
    };

    // 2. 扫码成功后的动作
    const onScanSuccess = (decodedText, decodedResult) => {
        // 播放提示音或震动
        if (navigator.vibrate) navigator.vibrate(100);

        resultText.innerText = "单号: " + decodedText;

        // 【关键】自动拍照逻辑：直接从当前视频流抓取画面
        const video = document.querySelector('#reader video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        // 生成照片
        const imgData = canvas.toDataURL("image/jpeg");
        const img = document.createElement('img');
        img.src = imgData;
        img.className = 'photo-preview';
        photoContainer.prepend(img); // 把新照片放在最前面

        console.log("已自动保存单号及照片:", decodedText);
        
        // 提示：此处可以加入发送数据到 Firebase 的代码
    };

    // 3. 启动摄像头
    html5QrCode.start(
        { facingMode: "environment" }, // 强制使用后置摄像头
        config, 
        onScanSuccess
    ).catch(err => {
        alert("摄像头启动失败，请检查权限或是否使用 HTTPS 访问");
    });
</script>
</body>
</html>
