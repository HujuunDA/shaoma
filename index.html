<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极速离线扫码 Pro</title>
    <style>
        :root { --success: #28a745; --primary: #007AFF; }
        body { font-family: -apple-system; margin: 0; background: #000; color: white; overflow-x: hidden; }
        #reader { width: 100vw; height: 60vh; background: #000; position: relative; }
        .scan-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 6px solid var(--success); box-sizing: border-box; z-index: 10; display: none; pointer-events: none; }
        .ui-panel { height: 40vh; background: #1a1a1a; padding: 15px; box-sizing: border-box; border-top: 1px solid #333; overflow-y: auto; }
        .stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .count-tag { background: var(--primary); padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; color: white; }
        .btn-exp { background: var(--success); }
        .btn-clr { background: #444; }
        .card { background: #2c2c2c; margin-bottom: 8px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 12px; }
        .card img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .card-code { font-family: monospace; font-size: 16px; color: #58a6ff; flex: 1; }
        .card-time { font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div id="reader"><div id="flash" class="scan-flash"></div></div>

<div class="ui-panel">
    <div class="stats">
        <span>扫码清单</span>
        <span class="count-tag">累计: <span id="count">0</span></span>
    </div>
    
    <div class="btn-group">
        <button class="btn-exp" onclick="exportExcel()">导出表格</button>
        <button class="btn-clr" onclick="clearData()">清空数据</button>
    </div>

    <div id="list"></div>
</div>

<audio id="beep"><source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg"></audio>

<script>
/* 这里直接引用压缩后的开源代码，不再请求外部网络 */

<script src="https://unpkg.com/html5-qrcode"></script> <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<script>
    let results = JSON.parse(localStorage.getItem('my_scans') || '[]');
    let lastCode = "";
    let lastTime = 0;
    const beep = document.getElementById('beep');

    // 渲染列表
    function render() {
        document.getElementById('count').innerText = results.length;
        const listEl = document.getElementById('list');
        listEl.innerHTML = results.slice().reverse().map(item => `
            <div class="card">
                <img src="${item.img}">
                <div>
                    <span class="card-code">${item.code}</span>
                    <div class="card-time">${item.time}</div>
                </div>
            </div>
        `).join('');
        localStorage.setItem('my_scans', JSON.stringify(results));
    }

    // 核心：极速扫描配置
    const html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 30, // 满帧运行
        qrbox: { width: 260, height: 200 },
        aspectRatio: 1.0,
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 1280 }, // 限制分辨率提高速度
            height: { ideal: 720 }
        }
    };

    const onSuccess = (text) => {
        const now = Date.now();
        if (text === lastCode && (now - lastTime < 3000)) return; // 3秒防重
        
        lastCode = text;
        lastTime = now;
        
        // 反馈
        try { beep.play(); } catch(e){}
        if(navigator.vibrate) navigator.vibrate(80);
        document.getElementById('flash').style.display='block';
        setTimeout(()=>document.getElementById('flash').style.display='none',150);

        // 拍照截取
        const video = document.querySelector('#reader video');
        const canvas = document.createElement('canvas');
        canvas.width = 160; canvas.height = 120;
        canvas.getContext('2d').drawImage(video, 0, 0, 160, 120);

        results.push({
            code: text,
            time: new Date().toLocaleTimeString(),
            img: canvas.toDataURL('image/jpeg', 0.5)
        });
        render();
    };

    html5QrCode.start({ facingMode: "environment" }, config, onSuccess);

    function exportExcel() {
        if(!results.length) return;
        const ws = XLSX.utils.json_to_sheet(results.map(x=>({"单号":x.code,"时间":x.time})));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
        XLSX.writeFile(wb, "扫描结果.xlsx");
    }

    function clearData() { if(confirm("清空？")){results=[];render();} }
    render();
</script>
</body>
</html>
