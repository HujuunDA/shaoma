<!DOCTYPE html>
<html>
<head>
    <title>快递扫码测试</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f4f4; }
        #reader { width: 100%; max-width: 500px; margin: auto; background: white; border-radius: 8px; overflow: hidden; }
        #result-container { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; display: none; }
        img { width: 100%; max-width: 300px; border: 2px solid #007aff; margin-top: 10px; }
        h2 { color: #007aff; }
    </style>
</head>
<body>

    <h2>快递单扫码测试</h2>
    <div id="reader"></div>

    <div id="result-container" id="resultContainer">
        <p><strong>单号：</strong> <span id="scannedCode" style="color:red; font-size: 20px;"></span></p>
        <p><strong>抓拍图片：</strong></p>
        <div id="photoBucket"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const resultContainer = document.getElementById('result-container');
        const scannedCodeText = document.getElementById('scannedCode');
        const photoBucket = document.getElementById('photoBucket');

        const config = { 
            fps: 10,  // 每秒扫描10次
            qrbox: { width: 250, height: 150 }, // 设置扫描框大小（适合条形码）
            aspectRatio: 1.0
        };

        // 成功扫码后的逻辑
        const onScanSuccess = (decodedText, decodedResult) => {
            // 1. 停止扫描（模拟圆通扫完一个就停止，或者你可以设置继续扫）
            // html5QrCode.stop(); 

            // 2. 显示结果
            resultContainer.style.display = 'block';
            scannedCodeText.innerText = decodedText;

            // 3. 自动抓拍当前画面
            const video = document.querySelector('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 4. 将抓拍的照片显示出来
            const img = new Image();
            img.src = canvas.toDataURL('image/jpeg');
            photoBucket.innerHTML = ''; // 清空旧图
            photoBucket.appendChild(img);

            console.log("扫码成功并已抓拍");
        };

        // 启动摄像头
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
