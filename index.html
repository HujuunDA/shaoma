<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快递级扫码系统 Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root { --success: #28a745; --primary: #007AFF; }
        body { font-family: -apple-system; margin: 0; background: #1a1a1a; color: white; }
        
        /* 扫描窗口优化 */
        #reader { width: 100%; background: #000; position: relative; }
        
        /* 成功时的闪烁特效 */
        .scan-success-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 5px solid var(--success); box-sizing: border-box;
            z-index: 10; display: none; pointer-events: none;
        }

        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #222; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-save { background: var(--success); color: white; }
        .btn-del { background: #444; color: #ccc; }

        .stats { padding: 10px 15px; background: #333; display: flex; justify-content: space-between; font-size: 14px; }

        #list { padding: 10px; height: 300px; overflow-y: auto; }
        .card { 
            background: #2c2c2c; margin-bottom: 10px; padding: 10px; 
            border-radius: 8px; display: flex; align-items: center; gap: 15px;
        }
        .card img { width: 60px; height: 45px; border-radius: 4px; object-fit: cover; border: 1px solid #444; }
        .card-info { flex: 1; }
        .card-code { font-family: monospace; font-size: 18px; color: #58a6ff; display: block; }
        .card-time { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div id="reader">
    <div id="flash" class="scan-success-flash"></div>
</div>

<div class="stats">
    <span>当前批次: <strong id="count">0</strong> 条</span>
    <span id="status" style="color: #888;">就绪</span>
</div>

<div class="controls">
    <button class="btn-save" onclick="exportData()">导出 Excel</button>
    <button class="btn-del" onclick="clearData()">清空今日数据</button>
</div>

<div id="list"></div>

<audio id="beepAudio" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
</audio>

<script>
    let results = JSON.parse(localStorage.getItem('my_scans') || '[]');
    let lastCode = "";
    let lastTime = 0;
    const beep = document.getElementById('beepAudio');
    const scanner = new Html5Qrcode("reader");

    function render() {
        document.getElementById('count').innerText = results.length;
        const listEl = document.getElementById('list');
        listEl.innerHTML = results.slice().reverse().map(item => `
            <div class="card">
                <img src="${item.img}">
                <div class="card-info">
                    <span class="card-code">${item.code}</span>
                    <span class="card-time">${item.time}</span>
                </div>
            </div>
        `).join('');
        localStorage.setItem('my_scans', JSON.stringify(results));
    }

    const onScanSuccess = (text) => {
        const now = Date.now();
        // 核心优化：防重复逻辑 (同一号码3秒内不扫第二次)
        if (text === lastCode && (now - lastTime < 3000)) return;

        lastCode = text;
        lastTime = now;

        // 1. 声音反馈
        beep.play();

        // 2. 震动反馈 (iPhone 需要在静音模式关闭时有效)
        if (navigator.vibrate) navigator.vibrate(80);

        // 3. 视觉闪烁反馈
        const flash = document.getElementById('flash');
        flash.style.display = 'block';
        setTimeout(() => flash.style.display = 'none', 150);

        // 4. 自动拍照抓帧
        const video = document.querySelector('#reader video');
        const canvas = document.createElement('canvas');
        canvas.width = 160; canvas.height = 120;
        canvas.getContext('2d').drawImage(video, 0, 0, 160, 120);
        
        // 5. 存储
        results.push({
            code: text,
            time: new Date().toLocaleTimeString(),
            img: canvas.toDataURL('image/jpeg', 0.5)
        });

        render();
    };

    function exportData() {
        if (results.length === 0) return alert("暂无数据");
        const ws = XLSX.utils.json_to_sheet(results.map(x => ({ "单号": x.code, "时间": x.time })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Scans");
        XLSX.writeFile(wb, `扫码记录_${new Date().toLocaleDateString()}.xlsx`);
    }

    function clearData() {
        if(confirm("确定清空吗？")) { results = []; render(); }
    }

    // 启动摄像头：优化对焦和帧率
    scanner.start(
        { facingMode: "environment" },
        { fps: 25, qrbox: { width: 260, height: 180 } },
        onScanSuccess
    ).catch(() => {
        document.getElementById('status').innerText = "错误：请检查 HTTPS 或权限";
    });

    render();
</script>
</body>
</html>
